<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ICML 2026 论文 · 按分类</title>
<link rel="stylesheet" href="styles.css?v=20260625b">
</head>
<body>

<nav class="topnav">
  <div class="brand">ICML 2026 · <span>论文导航</span></div>
  <div class="nav-links">
    <a href="index.html" class="active">📂 按分类</a>
    <a href="orgs.html">🏢 按机构</a>
  </div>
  <div class="stats" id="topnavStats">加载中...</div>
</nav>

<!-- Top bar: GLOBAL search (across ALL papers) + venue filter -->
<div class="controls">
  <div class="search-box">
    <input type="search" id="globalSearch"
      placeholder="🌐 全局搜索所有 6341 篇论文(标题 / 摘要 / 中文解读 / 机构 / 分类)...">
  </div>
  <button class="filter-btn active" data-filter="all">全部</button>
  <button class="filter-btn" data-filter="oral">Oral</button>
  <button class="filter-btn" data-filter="spotlight">Spotlight</button>
  <button class="filter-btn" data-filter="high">高分 (≥4.5)</button>
  <button class="filter-btn" data-filter="fav">★ 收藏</button>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="search-box small">
      <input type="search" id="catFilterBox" placeholder="筛选侧边栏分类名...">
    </div>
    <ul class="sidebar-list" id="categoryList">
      <li class="loading">加载中...</li>
    </ul>
  </aside>

  <main class="content" id="content">
    <div class="loading">📚 正在加载论文数据...</div>
  </main>
</div>

<button class="back-top" id="backTop" title="回到顶部">↑</button>

<script src="app.js?v=20260625b"></script>
<script>
let CATEGORIES = [];
let PAPERS = {};      // id -> compact paper
let ALL_PAPERS = [];  // ordered list (for global search)
let ORG_TYPES = {};
let CURRENT_CAT = null;
let CURRENT_SUBCAT = null;   // string or null
let EXPANDED_CAT = null;     // which cat has its subcats expanded in sidebar
let FILTER_MODE = 'all';
let GLOBAL_Q = '';           // top bar = global search across ALL papers
let LOCAL_Q = '';            // in-content = within current cat/subcat only
let PAGE = 0;

async function init() {
  try {
    const [cats, papersList, orgs, meta] = await Promise.all([
      loadJSON('data/categories.json'),
      loadJSON('data/papers.json'),
      loadJSON('data/orgs.json'),
      loadJSON('data/meta.json'),
    ]);
    CATEGORIES = cats;
    ALL_PAPERS = papersList;
    for (const p of papersList) PAPERS[p.id] = p;
    for (const o of orgs) ORG_TYPES[o.name] = o.type;

    document.getElementById('topnavStats').textContent =
      `${meta.paper_count} 篇 · ${meta.category_count} 个分类 · ${meta.org_count} 个机构`;

    renderSidebar();
    if (CATEGORIES.length) {
      selectCategory(CATEGORIES[0].name);
    }
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<div class="empty">加载失败:${esc(e.message)}<br>请先执行 <code>python -m src.build_site_data</code> 生成数据。</div>`;
    console.error(e);
  }
}

function renderSidebar() {
  const filterText = (document.getElementById('catFilterBox').value || '').toLowerCase().trim();
  const ul = document.getElementById('categoryList');
  const filtered = filterText
    ? CATEGORIES.filter(c => c.name.toLowerCase().includes(filterText))
    : CATEGORIES;

  const html = [];
  // When global search is active, show a synthetic "搜索结果" item at the top.
  if (GLOBAL_Q) {
    const active = CURRENT_CAT === '__GLOBAL__' ? ' active' : '';
    html.push(`<li class="sidebar-item${active}" data-cat="__GLOBAL__">
      <span class="name">🔍 搜索: ${esc(GLOBAL_Q.slice(0, 16))}${GLOBAL_Q.length > 16 ? '…' : ''}</span>
    </li>`);
  }
  for (const c of filtered) {
    const hasSubs = c.subcats && c.subcats.length > 1;
    const isExpanded = EXPANDED_CAT === c.name;
    const isActive = c.name === CURRENT_CAT && !CURRENT_SUBCAT;
    const hot = c.hot ? '<span class="hot">🔥</span>' : '';
    const arrow = hasSubs
      ? `<span class="subcat-arrow">${isExpanded ? '▾' : '▸'}</span>` : '';
    html.push(`<li class="sidebar-item${isActive ? ' active' : ''}" data-cat="${esc(c.name)}">
      <span class="name">${esc(c.name)}${hot}${arrow}</span>
      <span class="badge">${c.count}</span>
    </li>`);
    if (hasSubs && isExpanded) {
      for (const sc of c.subcats) {
        const scActive = CURRENT_CAT === c.name && CURRENT_SUBCAT === sc.name;
        html.push(`<li class="sidebar-item subcat${scActive ? ' active' : ''}"
          data-cat="${esc(c.name)}" data-sc="${esc(sc.name)}">
          <span class="name">${esc(sc.name)}</span>
          <span class="badge">${sc.paper_ids.length}</span>
        </li>`);
      }
    }
  }
  ul.innerHTML = html.join('');

  ul.querySelectorAll('.sidebar-item').forEach(li => {
    li.onclick = () => {
      if (li.dataset.sc) {
        selectSubcat(li.dataset.cat, li.dataset.sc);
      } else {
        selectCategory(li.dataset.cat);
      }
    };
  });
}

function selectCategory(name) {
  if (name === '__GLOBAL__') {
    CURRENT_CAT = '__GLOBAL__';
    CURRENT_SUBCAT = null;
    EXPANDED_CAT = null;
    PAGE = 0;
    renderSidebar();
    renderContent();
    return;
  }
  // Click on already-open cat with subs → just collapse; otherwise switch & expand
  const cat = CATEGORIES.find(c => c.name === name);
  const hasSubs = cat && cat.subcats && cat.subcats.length > 1;
  if (CURRENT_CAT === name && CURRENT_SUBCAT === null && EXPANDED_CAT === name) {
    EXPANDED_CAT = null;
  } else {
    CURRENT_CAT = name;
    CURRENT_SUBCAT = null;
    EXPANDED_CAT = hasSubs ? name : null;
    PAGE = 0;
    LOCAL_Q = '';
  }
  renderSidebar();
  renderContent();
}

function selectSubcat(catName, scName) {
  CURRENT_CAT = catName;
  CURRENT_SUBCAT = scName;
  PAGE = 0;
  LOCAL_Q = '';
  renderSidebar();
  renderContent();
}

function renderContent() {
  // ----- Global search mode -----
  if (CURRENT_CAT === '__GLOBAL__') {
    let papers = applySearch(ALL_PAPERS, GLOBAL_Q);
    papers = applyFilter(papers, FILTER_MODE);
    papers = sortPapers(papers, 'rating');
    const totalAfter = papers.length;
    const totalPages = Math.max(1, Math.ceil(totalAfter / PAGE_SIZE));
    if (PAGE >= totalPages) PAGE = 0;
    const pageSlice = papers.slice(PAGE * PAGE_SIZE, (PAGE + 1) * PAGE_SIZE);
    const cards = pageSlice.length
      ? pageSlice.map(p => renderPaperCard(p, ORG_TYPES)).join('')
      : '<div class="empty">没有匹配的论文</div>';

    document.getElementById('content').innerHTML = `
      <div class="content-header">
        <h1>🔍 全局搜索结果</h1>
        <div class="meta">
          关键词 <b>${esc(GLOBAL_Q)}</b> · 在全部 ${ALL_PAPERS.length} 篇论文中匹配到 <b>${totalAfter}</b> 篇
        </div>
      </div>
      <div id="paperList" class="paper-grid">${cards}</div>
      ${renderPager(totalAfter, PAGE_SIZE, PAGE, (np) => {
        PAGE = np; renderContent();
        window.scrollTo({top:0, behavior:'smooth'});
      })}
    `;
    bindFavButtons(document.getElementById('paperList'));
    return;
  }

  // ----- Category / subcat view -----
  const cat = CATEGORIES.find(c => c.name === CURRENT_CAT);
  if (!cat) return;
  const oral = cat.oral_count || 0;
  const rationale = cat.rationale
    ? `<div style="color:var(--text-faint);font-size:12px;margin-top:6px;">💡 ${esc(cat.rationale)}</div>`
    : '';

  let pids;
  let displayName = cat.name;
  if (CURRENT_SUBCAT) {
    const sc = cat.subcats.find(s => s.name === CURRENT_SUBCAT);
    pids = sc ? sc.paper_ids : [];
    displayName = cat.name + ' › ' + CURRENT_SUBCAT;
  } else {
    pids = cat.paper_ids;
  }
  let papers = pids.map(pid => PAPERS[pid]).filter(Boolean);

  // Local search (within current cat/subcat) + venue filter
  papers = applyFilter(papers, FILTER_MODE);
  papers = applySearch(papers, LOCAL_Q);
  papers = sortPapers(papers, 'rating');

  const totalAfter = papers.length;
  const totalPages = Math.max(1, Math.ceil(totalAfter / PAGE_SIZE));
  if (PAGE >= totalPages) PAGE = 0;
  const pageSlice = papers.slice(PAGE * PAGE_SIZE, (PAGE + 1) * PAGE_SIZE);

  const cards = pageSlice.length
    ? pageSlice.map(p => renderPaperCard(p, ORG_TYPES)).join('')
    : '<div class="empty">没有匹配的论文(可清空本分类搜索框)</div>';

  document.getElementById('content').innerHTML = `
    <div class="content-header">
      <h1>${esc(displayName)}</h1>
      <div class="meta">
        共 <b>${pids.length}</b> 篇 · oral ${oral} 篇 ·
        筛选/搜索后 <b>${totalAfter}</b> 篇
      </div>
      ${rationale}
    </div>
    <div class="content-toolbar">
      <div class="search-box">
        <input type="search" id="localSearch" value="${esc(LOCAL_Q)}"
          placeholder="🔎 仅在当前分类「${esc(displayName)}」内搜索...">
      </div>
    </div>
    <div id="paperList" class="paper-grid">${cards}</div>
    ${renderPager(totalAfter, PAGE_SIZE, PAGE, (np) => {
      PAGE = np; renderContent();
      window.scrollTo({top:0, behavior:'smooth'});
    })}
  `;

  bindFavButtons(document.getElementById('paperList'));

  // Local search input: re-render on change, preserve focus
  const localInput = document.getElementById('localSearch');
  if (localInput) {
    localInput.oninput = debounce((e) => {
      LOCAL_Q = e.target.value || '';
      PAGE = 0;
      renderContent();
      // restore focus + cursor after re-render
      const newInput = document.getElementById('localSearch');
      if (newInput) {
        newInput.focus();
        newInput.setSelectionRange(newInput.value.length, newInput.value.length);
      }
    }, 200);
  }
}

// ---- TOP global search (searches across ALL papers) ----
document.getElementById('globalSearch').oninput = debounce((e) => {
  GLOBAL_Q = (e.target.value || '').trim();
  PAGE = 0;
  if (GLOBAL_Q) {
    CURRENT_CAT = '__GLOBAL__';
    CURRENT_SUBCAT = null;
    EXPANDED_CAT = null;
  } else if (CURRENT_CAT === '__GLOBAL__') {
    // Cleared — fall back to first real cat
    selectCategory(CATEGORIES[0].name);
    return;
  }
  renderSidebar();
  renderContent();
}, 200);

document.querySelectorAll('.controls .filter-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.controls .filter-btn').forEach(x => x.classList.remove('active'));
    btn.classList.add('active');
    FILTER_MODE = btn.dataset.filter;
    PAGE = 0;
    renderContent();
  };
});

document.getElementById('catFilterBox').oninput = debounce(renderSidebar, 150);

// back-to-top
const backTop = document.getElementById('backTop');
window.addEventListener('scroll', () => {
  backTop.classList.toggle('show', window.scrollY > 400);
});
backTop.onclick = () => window.scrollTo({top:0, behavior:'smooth'});

init();
</script>
</body>
</html>
