<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ICML 2026 论文 · 按机构</title>
<link rel="stylesheet" href="styles.css?v=20260625b">
</head>
<body>

<nav class="topnav">
  <div class="brand">ICML 2026 · <span>论文导航</span></div>
  <div class="nav-links">
    <a href="index.html">📂 按分类</a>
    <a href="orgs.html" class="active">🏢 按机构</a>
  </div>
  <div class="stats" id="topnavStats">加载中...</div>
</nav>

<div class="controls">
  <div class="search-box">
    <input type="search" id="paperSearch" placeholder="搜索该机构论文标题 / 摘要 / 中文解读...">
  </div>
  <button class="filter-btn active" data-filter="all">全部</button>
  <button class="filter-btn" data-filter="oral">Oral</button>
  <button class="filter-btn" data-filter="spotlight">Spotlight</button>
  <button class="filter-btn" data-filter="fav">★ 收藏</button>
  <button class="filter-btn lead-btn" id="leadFilterBtn"
    title="只保留一作或通讯(尾作)为该机构的论文">仅一作/通讯</button>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="search-box small">
      <input type="search" id="orgFilterBox" placeholder="筛选机构名...">
    </div>
    <div class="filter-row" id="typeFilters">
      <button data-type="all" class="active">全部</button>
      <button data-type="university">高校</button>
      <button data-type="company">公司</button>
      <button data-type="research_lab">研究院</button>
      <button data-type="government">政府</button>
      <button data-type="hospital">医院</button>
    </div>
    <ul class="sidebar-list" id="orgList">
      <li class="loading">加载中...</li>
    </ul>
  </aside>

  <main class="content" id="content">
    <div class="loading">🏢 正在加载机构数据...</div>
  </main>
</div>

<button class="back-top" id="backTop" title="回到顶部">↑</button>

<script src="app.js?v=20260625b"></script>
<script>
let ORGS = [];
let PAPERS = {};         // id -> compact paper
let ORG_TYPES = {};
let CURRENT_ORG = null;
let TYPE_FILTER = 'all';
let ORG_NAME_FILTER = '';
let LEAD_ONLY = false;    // ← 新需求:仅一作/通讯
let FILTER_MODE = 'all';
let SEARCH_Q = '';
let EXPANDED_CATS = new Set();   // which cat groups are expanded in current org view

const TYPE_LABEL = {
  university: '高校', company: '公司', research_lab: '研究院',
  government: '政府', hospital: '医院', independent: '独立', other: '其他',
};

async function init() {
  try {
    const [orgs, papersList, meta] = await Promise.all([
      loadJSON('data/orgs.json'),
      loadJSON('data/papers.json'),
      loadJSON('data/meta.json'),
    ]);
    ORGS = orgs;
    for (const p of papersList) PAPERS[p.id] = p;
    for (const o of orgs) ORG_TYPES[o.name] = o.type;

    const typeBits = Object.entries(meta.org_type_counts || {})
      .map(([t, n]) => `${TYPE_LABEL[t] || t} ${n}`).join(' · ');
    document.getElementById('topnavStats').textContent =
      `${meta.org_count} 个机构 · ${meta.paper_count} 篇 · ${typeBits}`;

    renderSidebar();
    if (ORGS.length) selectOrg(ORGS[0].name);
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<div class="empty">加载失败:${esc(e.message)}<br>请先执行 <code>python -m src.build_site_data</code> 生成数据。</div>`;
    console.error(e);
  }
}

function filteredOrgs() {
  let list = ORGS;
  if (TYPE_FILTER !== 'all') list = list.filter(o => o.type === TYPE_FILTER);
  if (ORG_NAME_FILTER) {
    const q = ORG_NAME_FILTER.toLowerCase();
    list = list.filter(o => o.name.toLowerCase().includes(q));
  }
  return list;
}

function renderSidebar() {
  const list = filteredOrgs();
  const ul = document.getElementById('orgList');
  if (!list.length) {
    ul.innerHTML = '<li class="empty">没有匹配的机构</li>';
    return;
  }
  // Cap rendering at 500 for perf; user can search to narrow.
  const slice = list.slice(0, 500);
  ul.innerHTML = slice.map(o => {
    const active = o.name === CURRENT_ORG ? ' active' : '';
    const cnt = LEAD_ONLY ? o.lead_paper_count : o.paper_count;
    return `<li class="sidebar-item${active}" data-org="${esc(o.name)}">
      <span class="name">${esc(o.name)}</span>
      <span class="org-type-badge ${o.type}">${TYPE_LABEL[o.type] || o.type}</span>
      <span class="badge">${cnt}</span>
    </li>`;
  }).join('') + (list.length > 500
    ? `<li class="empty" style="padding:8px;">仅显示前 500 个机构,缩小搜索范围以查看更多</li>` : '');
  ul.querySelectorAll('.sidebar-item').forEach(li => {
    li.onclick = () => selectOrg(li.dataset.org);
  });
}

function selectOrg(name) {
  CURRENT_ORG = name;
  EXPANDED_CATS = new Set();   // reset expansion when switching orgs
  // first group expanded by default; the actual expansion is decided in renderContent.
  renderSidebar();
  renderContent();
}

function renderContent() {
  const org = ORGS.find(o => o.name === CURRENT_ORG);
  if (!org) return;

  // Determine paper IDs based on lead-only toggle
  const allowedSet = LEAD_ONLY ? new Set(org.lead_paper_ids || []) : null;

  // For each (cat, paper_ids), narrow by lead toggle + search + filter
  const cats = Object.entries(org.papers_by_category).map(([cat, pids]) => {
    let kept = allowedSet ? pids.filter(pid => allowedSet.has(pid)) : pids.slice();
    // Hydrate
    let papers = kept.map(pid => PAPERS[pid]).filter(Boolean);
    papers = applyFilter(papers, FILTER_MODE);
    papers = applySearch(papers, SEARCH_Q);
    // Sort: oral first then by title
    papers.sort((a, b) => {
      const va = a.v === 'oral' ? 0 : a.v === 'spotlight' ? 1 : 2;
      const vb = b.v === 'oral' ? 0 : b.v === 'spotlight' ? 1 : 2;
      if (va !== vb) return va - vb;
      return a.t.localeCompare(b.t);
    });
    return { cat, papers, rawCount: pids.length, leadCount: kept.length };
  }).filter(g => g.papers.length > 0)  // hide cats that emptied out
    .sort((a, b) => b.papers.length - a.papers.length);

  const totalShown = cats.reduce((s, g) => s + g.papers.length, 0);
  const totalPapers = LEAD_ONLY ? org.lead_paper_count : org.paper_count;

  // Expand the largest by default if user hasn't toggled anything
  if (EXPANDED_CATS.size === 0 && cats.length) {
    EXPANDED_CATS.add(cats[0].cat);
  }

  const groupsHtml = cats.length ? cats.map(g => {
    const open = EXPANDED_CATS.has(g.cat) ? ' open' : '';
    const cards = g.papers.map(p => renderPaperCard(p, ORG_TYPES)).join('');
    return `<div class="cat-group${open}" data-cat="${esc(g.cat)}">
      <div class="cat-header">
        <span><span class="caret">▶</span><span class="name">${esc(g.cat)}</span></span>
        <span class="meta">${g.papers.length} 篇</span>
      </div>
      <div class="cat-body"><div class="paper-grid">${cards}</div></div>
    </div>`;
  }).join('') : '<div class="empty">没有匹配的论文</div>';

  const leadHint = LEAD_ONLY
    ? `<span style="color:var(--gold);margin-left:8px;font-size:12px">[仅一作/通讯]</span>`
    : '';

  document.getElementById('content').innerHTML = `
    <div class="content-header">
      <h1>${esc(org.name)}
        <span class="org-type-badge ${org.type}">${TYPE_LABEL[org.type] || org.type}</span>
        ${leadHint}
      </h1>
      <div class="meta">
        共 <b>${totalPapers}</b> 篇 · 横跨 ${Object.keys(org.papers_by_category).length} 个分类 ·
        筛选/搜索后显示 <b>${totalShown}</b> 篇
        ${LEAD_ONLY ? ` · 一作或通讯 ${org.lead_paper_count}/${org.paper_count} 篇` : ''}
      </div>
    </div>
    <div id="groupsContainer">${groupsHtml}</div>
  `;

  const container = document.getElementById('groupsContainer');
  bindFavButtons(container);
  container.querySelectorAll('.cat-group .cat-header').forEach(h => {
    h.onclick = () => {
      const grp = h.parentElement;
      const catName = grp.dataset.cat;
      if (EXPANDED_CATS.has(catName)) EXPANDED_CATS.delete(catName);
      else EXPANDED_CATS.add(catName);
      grp.classList.toggle('open');
    };
  });
}

// ---- sidebar controls ----
document.getElementById('orgFilterBox').oninput = debounce((e) => {
  ORG_NAME_FILTER = e.target.value || '';
  renderSidebar();
}, 150);
document.querySelectorAll('#typeFilters button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('#typeFilters button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    TYPE_FILTER = b.dataset.type;
    renderSidebar();
  };
});

// ---- global controls (top bar) ----
document.getElementById('paperSearch').oninput = debounce((e) => {
  SEARCH_Q = e.target.value || '';
  renderContent();
}, 200);

document.querySelectorAll('.controls .filter-btn[data-filter]').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.controls .filter-btn[data-filter]').forEach(
      x => x.classList.remove('active'));
    btn.classList.add('active');
    FILTER_MODE = btn.dataset.filter;
    renderContent();
  };
});

const leadBtn = document.getElementById('leadFilterBtn');
leadBtn.onclick = () => {
  LEAD_ONLY = !LEAD_ONLY;
  leadBtn.classList.toggle('active', LEAD_ONLY);
  // counts in sidebar also flip
  renderSidebar();
  renderContent();
};

// back-to-top
const backTop = document.getElementById('backTop');
window.addEventListener('scroll', () => {
  backTop.classList.toggle('show', window.scrollY > 400);
});
backTop.onclick = () => window.scrollTo({top:0, behavior:'smooth'});

init();
</script>
</body>
</html>
